<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2; --green: #39FF14; --red: #FF3131;
            --bg: #050507; --cyan: #00FFFF; --gold: #FFD700;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh; margin: 0;
        }

        .glass {
            background: rgba(15, 15, 22, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.4s ease;
        }

        .glass:hover {
            border-color: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        .mode-btn { background: rgba(255,255,255,0.03); color: #888; border: 1px solid transparent; transition: all 0.3s; }
        .mode-btn.active { background: rgba(138, 43, 226, 0.2); color: white; border-color: var(--purple); }
        .mode-btn.active.webhook-active { background: rgba(0, 255, 255, 0.15); color: var(--cyan); border-color: var(--cyan); }

        .gift-option { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 12px; transition: all 0.2s; }
        .gift-option:hover { background: rgba(138, 43, 226, 0.15); transform: translateX(5px); }
        
        #loader { position: fixed; inset: 0; background: #050507; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(138, 43, 226, 0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-copy-link {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 5px 8px;
            border-radius: 8px; color: #71717a; cursor: pointer; transition: all 0.2s;
        }
        .btn-copy-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 255, 255, 0.05); }

        input, select { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body class="p-2 md:p-6 pb-12">

    <script>
        // LÓGICA DE OVERLAY PARA OBS (FONDO TRANSPARENTE)
        const urlParams = new URLSearchParams(window.location.search);
        const overlayType = urlParams.get('overlay'); 
        const isOverlay = !!overlayType;

        if(isOverlay) {
            document.documentElement.style.background = 'transparent';
            document.body.style.background = 'transparent';
            document.body.style.backgroundImage = 'none';
            document.body.className = 'm-0 p-0 w-screen h-screen overflow-hidden bg-transparent';
            
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('nav-header').style.display = 'none';
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('view-dashboard').style.display = 'none';
                
                if (['chat', 'gifts', 'likes', 'donators'].includes(overlayType)) {
                    const widgetContainer = document.createElement('div');
                    widgetContainer.className = 'w-full h-full p-2 flex flex-col justify-start overflow-hidden bg-transparent';
                    document.body.appendChild(widgetContainer);

                    let targetId = '';
                    if (overlayType === 'chat') targetId = 'chat-container';
                    if (overlayType === 'gifts') targetId = 'gift-container';
                    if (overlayType === 'likes') targetId = 'ranking-container';
                    if (overlayType === 'donators') targetId = 'dashboard-donators-container';
                    
                    const targetEl = document.getElementById(targetId);
                    if(targetEl) {
                        targetEl.className = 'w-full h-full overflow-hidden flex flex-col bg-transparent';
                        widgetContainer.appendChild(targetEl);
                    }
                    
                    const style = document.createElement('style');
                    style.innerHTML = `.bg-zinc-900\\/50, .bg-green-900\\/20, .bg-white\\/5 { background: rgba(10, 10, 15, 0.85) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(10px) !important; border-radius: 15px; margin-bottom: 8px; }`;
                    document.head.appendChild(style);
                }
            });
        }
    </script>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" class="mt-6 text-cyan-400 font-bold tracking-[0.2em] animate-pulse text-xs uppercase">Inicializando Sistema...</p>
    </div>

    <nav id="nav-header" class="max-w-[1800px] mx-auto mb-8 flex flex-col lg:flex-row items-center justify-between glass p-5 gap-6">
        <div class="flex items-center gap-5 w-full lg:w-auto">
            <div class="relative">
                <img id="host-avatar" src="/Logo.png" class="h-14 w-14 md:h-16 md:w-16 object-cover rounded-2xl border border-white/10" onerror="this.src='/Logo.png'">
                <div id="status-pulse" class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-red-500 border-4 border-[#0a0a0f]"></div>
            </div>
            <div>
                <h1 id="host-title" class="text-2xl md:text-4xl font-black italic tracking-tighter uppercase">NEXORA <span class="text-cyan-500">ULTRA</span></h1>
                <span id="connection-status" class="text-[10px] uppercase tracking-[4px] text-red-500 font-bold mt-1">SISTEMA OFFLINE</span>
            </div>
        </div>

        <div class="flex flex-wrap justify-center lg:justify-end gap-3 items-center w-full lg:w-auto">
            <input id="username" type="text" placeholder="@usuario" class="bg-black/40 border border-white/5 px-4 py-2 text-xs rounded-xl outline-none w-36">
            <input id="key" type="password" placeholder="Key" class="bg-black/40 border border-white/5 px-4 py-2 text-xs rounded-xl outline-none w-24">
            <button id="btn-connect" class="bg-cyan-500 text-black px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 px-8 py-3 rounded-xl font-black text-xs uppercase">Salir</button>
        </div>
    </nav>

    <div id="action-buttons" class="max-w-[1800px] mx-auto mb-8 flex flex-col sm:flex-row gap-4 justify-center">
        <a href="juego.html" class="flex-1 max-w-[350px] bg-purple-600 p-4 rounded-2xl font-bold uppercase text-center flex items-center justify-center gap-3 hover:scale-105 transition-all">
            <i data-lucide="gamepad-2"></i> Dashboard Juego
        </a>
        <a href="interactivo.html" class="flex-1 max-w-[350px] bg-cyan-600 p-4 rounded-2xl font-bold uppercase text-center flex items-center justify-center gap-3 hover:scale-105 transition-all">
            <i data-lucide="zap"></i> Panel Interactivo
        </a>
    </div>

    <main id="view-dashboard" class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-cyan-400 font-bold uppercase text-[10px] mb-5 tracking-[0.2em]">CONFIGURAR ALERTA</h2>
                <div class="flex bg-black/40 p-1 rounded-xl mb-6">
                    <button onclick="setMode('mp3')" id="mode-mp3" class="mode-btn active flex-1 py-2.5 text-[10px] font-bold uppercase rounded-lg">AUDIO MP3</button>
                    <button onclick="setMode('link')" id="mode-link" class="mode-btn flex-1 py-2.5 text-[10px] font-bold uppercase rounded-lg">WEBHOOK</button>
                </div>

                <div class="space-y-4">
                    <div class="relative" id="custom-gift-dropdown">
                        <button id="selected-gift-display" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-xs flex justify-between items-center text-zinc-400 font-bold">
                            <span id="current-gift-text">Seleccionar Regalo...</span>
                            <i data-lucide="chevron-down" class="text-cyan-400"></i>
                        </button>
                        <div id="gift-list-panel" class="hidden absolute z-50 mt-2 w-full bg-[#0f0f15] border border-white/10 rounded-2xl overflow-hidden shadow-2xl">
                            <div class="p-2 border-b border-white/5">
                                <input type="text" id="gift-search" placeholder="Buscar..." class="w-full bg-black p-2 text-xs text-white rounded-lg outline-none">
                            </div>
                            <div id="gift-options-container" class="max-h-60 overflow-y-auto custom-scrollbar"></div>
                        </div>
                        <input type="hidden" id="gift-select" value="">
                    </div>

                    <div id="container-mp3">
                        <input type="file" id="file-input" accept="audio/mpeg" class="hidden">
                        <button onclick="document.getElementById('file-input').click()" class="w-full bg-black/20 border-2 border-dashed border-white/5 p-5 rounded-2xl text-xs flex flex-col items-center gap-3">
                            <i data-lucide="music-4" class="text-purple-400"></i>
                            <span id="file-name" class="uppercase font-bold">Cargar MP3</span>
                        </button>
                    </div>

                    <div id="container-link" class="hidden">
                        <input id="link-input" type="text" placeholder="URL del comando..." class="w-full p-4 rounded-xl text-xs text-cyan-400">
                    </div>

                    <button id="btn-save-action" class="w-full bg-white text-black font-black py-4 rounded-xl text-xs uppercase hover:bg-cyan-500 transition-all">Vincular Acción</button>
                </div>
            </section>

            <section class="glass p-6 flex-1 min-h-[300px] flex flex-col">
                <h2 class="text-purple-400 font-bold text-[10px] mb-4 tracking-[0.2em]">EVENTOS ACTIVOS</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-3 custom-scrollbar"></div>
            </section>
        </div>

        <div class="lg:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass flex flex-col h-[400px]">
                <div class="p-4 bg-white/5 flex justify-between items-center text-[10px] font-black tracking-[0.3em] text-purple-400">
                    <span>FEED DE CHAT</span><button onclick="copyOverlayUrl('chat')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar"></div>
            </div>

            <div class="glass flex flex-col h-[400px]">
                <div class="p-4 bg-white/5 flex justify-between items-center text-[10px] font-black tracking-[0.3em] text-green-400">
                    <span>REGALOS LIVE</span><button onclick="copyOverlayUrl('gifts')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar"></div>
            </div>

            <div class="glass flex flex-col h-[400px]">
                <div class="p-4 bg-white/5 flex justify-between items-center text-[10px] font-black tracking-[0.3em] text-red-500">
                    <span>RANKING LIKES</span><button onclick="copyOverlayUrl('likes')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="ranking-container" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar"></div>
            </div>

            <div class="glass flex flex-col h-[400px]">
                <div class="p-4 bg-white/5 flex justify-between items-center text-[10px] font-black tracking-[0.3em] text-yellow-500">
                    <span>TOP DONADORES</span><button onclick="copyOverlayUrl('donators')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="dashboard-donators-container" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar"></div>
            </div>
        </div>

        <div class="lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-[10px] font-black uppercase mb-6 text-zinc-500 tracking-[0.2em]">CONTROLES DE VOZ</h2>
                <div class="space-y-6">
                    <div class="bg-black/40 p-4 rounded-2xl">
                        <div class="flex items-center justify-between mb-4">
                            <label class="text-[10px] text-zinc-400 font-bold uppercase">Estado TTS</label>
                            <input type="checkbox" id="tts-enabled" checked class="accent-cyan-500">
                        </div>
                        <select id="tts-voice" class="w-full p-3 rounded-xl text-xs text-white outline-none"></select>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl">
                        <div class="flex justify-between mb-3"><label class="text-[10px] font-bold">VOLUMEN</label><span id="vol-perc" class="text-cyan-400 font-black">70%</span></div>
                        <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-cyan-500">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-zinc-500 font-black">FILTRO DE AUDIENCIA</label>
                        <select id="tts-filter-select" class="w-full bg-black/40 p-3 rounded-xl text-[10px] text-white">
                            <option value="all">TODOS LOS USUARIOS</option>
                            <option value="followers">SÓLO SEGUIDORES</option>
                            <option value="vip">MODS / SUBS</option>
                        </select>
                    </div>
                </div>
            </section>
            
            <section class="glass flex-1 flex flex-col overflow-hidden min-h-[200px]">
                <div class="p-4 bg-white/5 text-center text-[10px] font-black text-zinc-500">HISTORIAL</div>
                <div id="gift-history" class="flex-1 overflow-y-auto p-4 space-y-2 text-[10px] font-mono text-zinc-600 custom-scrollbar"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();
        const donatorsMap = new Map();
        const giftersSet = new Set();
        let allGifts = [];

        // BUSCADOR DE REGALOS
        const giftPanel = document.getElementById('gift-list-panel');
        const giftDisplay = document.getElementById('selected-gift-display');
        const giftSearch = document.getElementById('gift-search');
        const optionsContainer = document.getElementById('gift-options-container');

        giftDisplay.onclick = () => giftPanel.classList.toggle('hidden');
        
        fetch('/gift-list').then(r => r.json()).then(data => { allGifts = data; renderGifts(data); });

        function renderGifts(list) {
            optionsContainer.innerHTML = list.map(g => `
                <div class="gift-option" onclick="selectGift('${g.name}', '${g.image}')">
                    <img src="${g.image}" class="w-7 h-7 object-contain">
                    <span class="text-white font-bold uppercase text-[11px]">${g.name}</span>
                </div>`).join('');
        }

        function selectGift(name, img) {
            document.getElementById('gift-select').value = name;
            document.getElementById('current-gift-text').innerHTML = `<div class="flex items-center gap-2 text-cyan-400"><img src="${img}" class="w-5 h-5"><span>${name.toUpperCase()}</span></div>`;
            giftPanel.classList.add('hidden');
        }

        giftSearch.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderGifts(allGifts.filter(g => g.name.toLowerCase().includes(term)));
        };

        // CONEXIÓN
        document.getElementById('btn-connect').onclick = () => {
            const user = document.getElementById('username').value;
            const key = document.getElementById('key').value;
            if(!user || !key) return alert("Faltan datos");
            document.getElementById('loader').style.display = 'flex';
            socket.emit("startConnection", { username: user, key });
        };

        document.getElementById('btn-disconnect').onclick = () => socket.emit("stopConnection");

        socket.on("status", (status) => {
            if(isOverlay) return;
            document.getElementById('loader').style.display = 'none';
            const connected = status === "connected";
            document.getElementById('connection-status').innerText = connected ? "SISTEMA ONLINE" : "SISTEMA OFFLINE";
            document.getElementById('connection-status').className = connected ? "text-[10px] uppercase tracking-[4px] text-cyan-400 font-bold mt-1" : "text-[10px] uppercase tracking-[4px] text-red-500 font-bold mt-1";
            document.getElementById('status-pulse').className = connected ? "absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-cyan-400 border-4 border-[#0a0a0f] animate-ping" : "absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-red-500 border-4 border-[#0a0a0f]";
            document.getElementById('btn-connect').classList.toggle('hidden', connected);
            document.getElementById('btn-disconnect').classList.toggle('hidden', !connected);
            if(connected) socket.emit("getActions", document.getElementById('username').value);
        });

        // TTS
        const synth = window.speechSynthesis;
        function loadVoices() {
            const voices = synth.getVoices();
            document.getElementById('tts-voice').innerHTML = voices.map((v, i) => `<option value="${i}" ${v.lang.includes('es') ? 'selected' : ''}>${v.name}</option>`).join('');
        }
        speechSynthesis.onvoiceschanged = loadVoices; loadVoices();

        function speak(text) {
            if (!document.getElementById('tts-enabled').checked || isOverlay) return;
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = synth.getVoices()[document.getElementById('tts-voice').value];
            utter.volume = document.getElementById('tts-volume').value;
            synth.speak(utter);
        }

        // SOCKET EVENTOS
        socket.on("chat", (data) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "bg-white/5 p-3 rounded-2xl border-l-4 border-purple-500 text-[11px] flex items-center gap-3 fade-in";
            let badges = data.isMod ? '<span class="bg-red-500 px-1 rounded text-[8px] mr-1">MOD</span>' : '';
            div.innerHTML = `<div>${badges}<span class="text-purple-400 font-black uppercase">${data.user}:</span> <span class="text-zinc-300">${data.message}</span></div>`;
            container.prepend(div);
            if(container.children.length > 15) container.removeChild(container.lastElementChild);
            speak(`${data.user} dice: ${data.message}`);
        });

        socket.on("gift", (data) => {
            const container = document.getElementById('gift-container');
            const div = document.createElement('div');
            div.className = "bg-green-500/10 p-3 rounded-2xl border border-green-500/20 flex items-center gap-3 fade-in";
            div.innerHTML = `<img src="${data.image}" class="w-8 h-8 object-contain"> <div class="text-[10px]"><b class="text-white">${data.user}</b> x${data.amount} <span class="text-green-400 font-bold">${data.gift}</span></div>`;
            container.prepend(div);
            
            donatorsMap.set(data.user, (donatorsMap.get(data.user) || 0) + (data.amount * 100));
            updateDonatorsRanking();
        });

        function updateDonatorsRanking() {
            const sorted = Array.from(donatorsMap.entries()).sort((a,b) => b[1] - a[1]).slice(0, 10);
            document.getElementById('dashboard-donators-container').innerHTML = sorted.map((d, i) => `
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3 text-[11px]"><span class="text-yellow-500 font-black">#${i+1}</span><span class="font-bold">${d[0]}</span></div>
                    <span class="text-yellow-500 font-black">${Math.floor(d[1])} pts</span>
                </div>`).join('');
        }

        function copyOverlayUrl(type) {
            const url = window.location.origin + '/?overlay=' + type;
            navigator.clipboard.writeText(url).then(() => alert('Overlay copiado para OBS'));
        }

        // GUARDADO DE ACCIONES
        let currentMode = 'mp3';
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-mp3').classList.toggle('active', mode === 'mp3');
            document.getElementById('mode-link').classList.toggle('active', mode === 'link');
            document.getElementById('container-mp3').classList.toggle('hidden', mode !== 'mp3');
            document.getElementById('container-link').classList.toggle('hidden', mode !== 'link');
        }

        document.getElementById('btn-save-action').onclick = () => {
            const user = document.getElementById('username').value;
            const gift = document.getElementById('gift-select').value;
            if(!user || !gift) return alert("Faltan datos");

            if(currentMode === 'mp3') {
                const file = document.getElementById('file-input').files[0];
                if(!file) return alert("Sube un audio");
                const reader = new FileReader();
                reader.onload = (e) => socket.emit("uploadAndSave", { username: user, gift, fileName: file.name, fileData: e.target.result });
                reader.readAsDataURL(file);
            } else {
                const link = document.getElementById('link-input').value;
                socket.emit("saveAction", { username: user, action: { gift, file: link, type: 'link' } });
            }
        };

        socket.on("actionsUpdated", (actions) => {
            document.getElementById('actions-list').innerHTML = actions.map((a, i) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="text-[10px]"><b class="${a.type === 'link' ? 'text-cyan-400' : 'text-purple-400'} uppercase">${a.type}</b><br><b class="text-white">${a.gift}</b></div>
                    <button onclick="socket.emit('deleteAction', {username: '${document.getElementById('username').value}', index: ${i}})" class="text-red-500"><i data-lucide="trash-2" class="w-4"></i></button>
                </div>`).join('');
            lucide.createIcons();
        });
    </script>
</body>
</html>
