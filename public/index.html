<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body class="p-2 md:p-4 pb-12">

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 text-cyan-500 font-bold tracking-widest animate-pulse uppercase">
            Procesando Datos...
        </p>
    </div>

    <!-- NAV -->
    <nav id="nav-header" class="max-w-[1800px] mx-auto mb-6 flex flex-col lg:flex-row items-center justify-between glass p-4 gap-4">
        <div class="flex items-center gap-4">
            <img id="host-avatar" src="/Logo.png" class="h-[60px] w-[60px] rounded-full">
            <div>
                <h1 id="host-title" class="text-3xl font-black italic">NEXORA <span class="text-cyan-500">ULTRA</span></h1>
                <span id="connection-status" class="text-xs text-red-500">Desconectado</span>
            </div>
        </div>

        <div class="flex gap-2">
            <input id="username" placeholder="@usuario_tiktok" class="input">
            <input id="key" type="password" placeholder="Access Key" class="input">
            <button id="btn-connect" class="btn-cyan">Conectar</button>
            <button id="btn-disconnect" class="btn-red hidden">Salir</button>
        </div>
    </nav>

    <!-- BOTONES -->
    <div id="action-buttons" class="flex gap-4 justify-center mb-6">
        <a href="juego.html" class="btn-purple">Ir a Juego</a>
        <a href="interactivo.html" class="btn-cyan">Ir a Interactivo</a>
    </div>

    <!-- MAIN -->
    <main id="view-dashboard" class="max-w-[1800px] mx-auto grid grid-cols-12 gap-6">

        <!-- IZQUIERDA -->
        <div class="col-span-3 flex flex-col gap-6">

            <section class="glass p-6">
                <h2>Configurar Alerta</h2>

                <input type="file" id="file-input" hidden>
                <button onclick="fileInput.click()" class="btn-upload">
                    Seleccionar MP3
                </button>

                <button id="btn-save-action" class="btn-white">
                    Guardar
                </button>
            </section>

            <section class="glass p-6 flex-1">
                <h2>Eventos</h2>
                <div id="actions-list"></div>
            </section>
        </div>

        <!-- CENTRO -->
        <div class="col-span-6 grid grid-cols-2 gap-4">
            <div class="box">
                <h3>CHAT</h3>
                <div id="chat-container"></div>
            </div>

            <div class="box">
                <h3>REGALOS</h3>
                <div id="gift-container"></div>
            </div>

            <div class="box">
                <h3>LIKES</h3>
                <div id="ranking-container"></div>
            </div>

            <div class="box">
                <h3>DONADORES</h3>
                <div id="dashboard-donators-container"></div>
            </div>
        </div>

        <!-- DERECHA -->
        <div class="col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2>Controles</h2>

                <input type="checkbox" id="tts-enabled"> Voz

                <input id="tts-volume" type="range" min="0" max="1" step="0.1">
            </section>

            <section class="glass p-6 flex-1">
                <h2>Historial</h2>
                <div id="gift-history"></div>
            </section>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
