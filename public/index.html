<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --red: #FF3131;
            --bg: #050507;
            --cyan: #00FFFF;
            --gold: #FFD700;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh;
            margin: 0;
        }

        .glass {
            background: rgba(15, 15, 22, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #loader {
            position: fixed; inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .mode-btn, .custom-select-trigger, .custom-select-option, button, a { cursor: pointer; }

        .mode-btn { background: rgba(255,255,255,0.05); color: #666; transition: all 0.3s; }
        .mode-btn:hover { background: rgba(255,255,255,0.1); color: #ccc; }
        .mode-btn.active { background: var(--purple); color: white; }

        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-copy-link {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 6px;
            border-radius: 6px; color: #a1a1aa; transition: all 0.2s;
        }
        .btn-copy-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 255, 255, 0.1); }

        .gift-card {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.05) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(57, 255, 20, 0.1);
            position: relative;
            overflow: hidden;
        }
        .gift-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .custom-select-wrapper { position: relative; user-select: none; width: 100%; }
        .custom-select-trigger {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 0.75rem 1rem; background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid #8A2BE2; border-radius: 9999px; color: #efefef;
            font-size: 0.75rem; font-weight: 700; transition: all 0.3s;
        }
        .custom-select-options {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background-color: #0a0a0a; border: 1px solid #8A2BE2; border-radius: 1rem;
            z-index: 50; opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s ease; max-height: 300px; display: flex; flex-direction: column;
        }
        .custom-select-wrapper.open .custom-select-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-select-search-container { padding: 0.75rem; border-bottom: 1px solid rgba(138, 43, 226, 0.2); }
        .custom-select-search {
            width: 100%; padding: 0.5rem 1rem; background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid #39FF14; border-radius: 9999px; color: #efefef; font-size: 0.75rem; outline: none;
        }
        .custom-select-options-list { overflow-y: auto; flex: 1; padding: 0.5rem 0; }
        .custom-select-option {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
            transition: background 0.2s; color: #a1a1aa; font-weight: 600;
        }
        .custom-select-option:hover { background-color: rgba(138, 43, 226, 0.1); color: white; }
        .custom-select-option-img { width: 24px; height: 24px; object-fit: contain; }
        .custom-select-option.hidden { display: none; }
    </style>
</head>
<body class="p-2 md:p-4 pb-12">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const overlayType = urlParams.get('overlay'); 
        const isOverlay = !!overlayType;

        if(isOverlay) {
            document.documentElement.style.background = 'transparent';
            document.body.style.background = 'transparent';
            document.body.style.backgroundImage = 'none';
            document.body.className = 'm-0 p-0 w-screen h-screen overflow-hidden bg-transparent';
            
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('nav-header').style.display = 'none';
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('view-dashboard').style.display = 'none';
                const ttsCheckbox = document.getElementById('tts-enabled');
                if(ttsCheckbox) ttsCheckbox.checked = false; 

                if (['chat', 'gifts', 'likes', 'donators'].includes(overlayType)) {
                    const widgetContainer = document.createElement('div');
                    widgetContainer.className = 'w-full h-full p-2 flex flex-col justify-start overflow-hidden bg-transparent';
                    document.body.appendChild(widgetContainer);

                    let targetId = '';
                    if (overlayType === 'chat') targetId = 'chat-container';
                    if (overlayType === 'gifts') targetId = 'gift-container';
                    if (overlayType === 'likes') targetId = 'ranking-container';
                    if (overlayType === 'donators') targetId = 'dashboard-donators-container';
                    
                    const targetEl = document.getElementById(targetId);
                    if(targetEl) {
                        targetEl.className = 'w-full h-full overflow-hidden flex flex-col bg-transparent';
                        widgetContainer.appendChild(targetEl);
                    }
                    
                    const style = document.createElement('style');
                    style.innerHTML = `.bg-zinc-900\\/50, .bg-green-900\\/20, .bg-black\\/40 { background: rgba(10, 10, 15, 0.85) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(8px) !important; border-radius: 12px; }`;
                    document.head.appendChild(style);
                }
            });
        }
    </script>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 text-cyan-500 font-bold tracking-widest animate-pulse uppercase">Procesando Datos...</p>
    </div>

    <nav id="nav-header" class="max-w-[1800px] mx-auto mb-6 flex flex-col lg:flex-row items-center justify-between glass p-4 gap-4">
        <div class="flex items-center gap-4 w-full lg:w-auto justify-center lg:justify-start">
            <img id="host-avatar" src="/Logo.png" alt="Logo" class="h-[50px] w-[50px] md:h-[60px] md:w-[60px] object-cover rounded-full border-2 border-transparent transition-all duration-500" onerror="this.src='/Logo.png'">
            <div class="flex flex-col">
                <h1 id="host-title" class="text-2xl md:text-3xl font-black italic tracking-tighter leading-none uppercase">NEXORA <span class="text-cyan-500">ULTRA</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="status-pulse" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="connection-status" class="text-[10px] uppercase tracking-[3px] text-red-500 font-bold italic">Desconectado</span>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-2 md:gap-4 items-center">
            <input id="username" type="text" placeholder="@usuario_tiktok" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs focus:border-cyan-500 outline-none w-[140px] md:w-40 font-medium">
            <input id="key" type="password" placeholder="Access Key" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs focus:border-cyan-500 outline-none w-[100px] md:w-32 font-medium">
            <button id="btn-connect" onmouseover="playHover()" class="bg-cyan-600 hover:bg-cyan-400 text-black px-4 md:px-6 py-2 rounded-lg font-black text-xs transition-all uppercase tracking-widest">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-zinc-900 border border-red-600 text-red-500 px-4 md:px-6 py-2 rounded-lg font-black text-xs transition-all uppercase tracking-widest">Salir</button>
        </div>
    </nav>

    <div id="action-buttons" class="max-w-[1800px] mx-auto mb-6 flex flex-col sm:flex-row gap-4 justify-center">
        <a href="juego.html" onmouseover="playHover()" class="flex-1 max-w-[300px] bg-purple-600 hover:bg-purple-500 text-white text-center py-3 px-6 rounded-xl font-black uppercase tracking-widest transition-all duration-300 border-2 border-purple-400 flex items-center justify-center gap-2">
            <i data-lucide="gamepad-2" class="w-5 h-5"></i> Ir a Juego
        </a>
        <a href="interactivo.html" onmouseover="playHover()" class="flex-1 max-w-[300px] bg-cyan-600 hover:bg-cyan-400 text-black text-center py-3 px-6 rounded-xl font-black uppercase tracking-widest transition-all duration-300 border-2 border-cyan-400 flex items-center justify-center gap-2">
            <i data-lucide="mouse-pointer-click" class="w-5 h-5"></i> Ir a Interactivo
        </a>
    </div>

    <main id="view-dashboard" class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 lg:h-[750px]">
        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-cyan-400 font-bold uppercase text-xs mb-4 flex items-center gap-2 italic tracking-widest"><i data-lucide="upload-cloud" class="w-4"></i> Configurar Alerta</h2>
                <div class="flex bg-black/40 p-1 rounded-lg border border-zinc-800 mb-4">
                    <button onclick="setMode('mp3')" onmouseover="playHover()" id="mode-mp3" class="mode-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Modo MP3</button>
                    <button onclick="setMode('link')" onmouseover="playHover()" id="mode-link" class="mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Webhook Juego</button>
                </div>
                
                <div class="space-y-4">
                    <div class="custom-select-wrapper" id="gift-select-wrapper">
                        <div class="custom-select-trigger" onclick="toggleCustomSelect()">
                            <span id="custom-select-label">Seleccionar regalo</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-purple-500" id="custom-select-arrow"></i>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-search-container">
                                <input type="text" class="custom-select-search" placeholder="Buscar..." onkeyup="filterCustomOptions(this.value)">
                            </div>
                            <div class="custom-select-options-list" id="custom-options-list"></div>
                        </div>
                        <input type="hidden" id="gift-select-value" value="">
                    </div>

                    <div id="gift-preview-container" class="hidden flex flex-col items-center justify-center p-4 bg-black/40 border border-zinc-800 rounded-xl">
                        <img id="gift-preview-img" src="" class="w-16 h-16 object-contain">
                    </div>

                    <div id="container-mp3">
                        <input type="file" id="file-input" accept="audio/mpeg" class="hidden">
                        <button onclick="document.getElementById('file-input').click()" class="w-full bg-zinc-900 border border-dashed border-zinc-700 p-3 rounded-lg text-xs text-zinc-400 flex flex-col items-center gap-2"><i data-lucide="music" class="w-4 h-4 text-purple-500"></i><span id="file-name">Seleccionar MP3...</span></button>
                    </div>
                    <div id="container-link" class="hidden">
                        <input id="link-input" type="text" placeholder="URL Webhook" class="w-full bg-black/60 border border-zinc-800 p-3 rounded-lg text-xs text-cyan-400 outline-none">
                    </div>
                    <button id="btn-save-action" class="w-full bg-white text-black font-black py-3 rounded-xl text-xs uppercase">Guardar y Vincular</button>
                </div>
            </section>
            <section class="glass flex-1 p-6 flex flex-col overflow-hidden">
                <h2 class="text-purple-400 font-bold uppercase text-xs mb-4 italic tracking-widest">Eventos Activos</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>

        <div class="col-span-1 lg:col-span-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass flex flex-col overflow-hidden h-[300px] lg:h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold italic text-purple-400 flex justify-between">
                    <span>CHAT</span> <button onclick="copyOverlayUrl('chat')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-[300px] lg:h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold italic text-green-400 flex justify-between">
                    <span>REGALOS</span> <button onclick="copyOverlayUrl('gifts')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-[300px] lg:h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold italic text-red-500 flex justify-between">
                    <span>TOP LIKES</span> <button onclick="copyOverlayUrl('likes')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="ranking-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-[300px] lg:h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold italic text-yellow-500 flex justify-between">
                    <span>DONADORES</span> <button onclick="copyOverlayUrl('donators')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="dashboard-donators-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-xs font-bold uppercase mb-4 text-zinc-500 italic">Voz Bot (TTS)</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between"><label class="text-[10px] text-zinc-500">ACTIVAR</label><input type="checkbox" id="tts-enabled" checked class="accent-cyan-500"></div>
                    <select id="tts-voice" class="w-full bg-black/40 border border-zinc-800 p-2 rounded text-xs text-white outline-none"></select>
                    <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-cyan-500">
                </div>
            </section>
            <section class="glass flex-1 overflow-hidden p-4">
                <h2 class="text-xs font-bold text-zinc-500 italic mb-2">Historial</h2>
                <div id="gift-history" class="flex-1 overflow-y-auto text-[10px] font-mono text-zinc-500 space-y-1"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();
        const donatorsMap = new Map();
        const giftersSet = new Set();
        const sndHover = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const sndSelect = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        sndHover.volume = 0.2; sndSelect.volume = 0.4;

        function playHover() { if(!isOverlay) sndHover.cloneNode().play().catch(()=>{}); }
        function playSelect() { if(!isOverlay) sndSelect.cloneNode().play().catch(()=>{}); }

        // --- SELECTOR LOGIC ---
        function toggleCustomSelect() {
            const wrapper = document.getElementById('gift-select-wrapper');
            wrapper.classList.toggle('open');
        }

        function filterCustomOptions(searchTerm) {
            const list = document.getElementById('custom-options-list');
            const options = list.querySelectorAll('.custom-select-option');
            const term = searchTerm.toLowerCase();
            options.forEach(opt => {
                const text = opt.innerText.toLowerCase();
                opt.classList.toggle('hidden', !text.includes(term));
            });
        }

        function selectCustomOption(value, name) {
            playSelect();
            document.getElementById('gift-select-value').value = value;
            document.getElementById('custom-select-label').innerText = name.toUpperCase();
            toggleCustomSelect();
            updateGiftPreview(value);
        }
        
        function updateGiftPreview(giftName) {
            const container = document.getElementById('gift-preview-container');
            const img = document.getElementById('gift-preview-img');
            if (giftName) {
                container.classList.remove('hidden');
                img.src = `/regalos/${giftName.toLowerCase().trim()}.png`;
            } else {
                container.classList.add('hidden');
            }
        }

        // --- SOCKETS & ACTIONS ---
        const btnConnect = document.getElementById('btn-connect');
        if(btnConnect) btnConnect.onclick = () => {
            const username = document.getElementById('username').value; 
            const key = document.getElementById('key').value;
            if(!username || !key) return alert("Faltan datos");
            document.getElementById('loader').style.display = 'flex'; 
            socket.emit("startConnection", { username, key });
        };

        socket.on("status", (status) => {
            document.getElementById('loader').style.display = 'none';
            if (status === "connected") {
                document.getElementById('connection-status').innerText = "ONLINE";
                document.getElementById('btn-connect').classList.add('hidden');
                document.getElementById('btn-disconnect').classList.remove('hidden');
                socket.emit("getActions", document.getElementById('username').value);
            }
        });

        function setMode(mode) {
            playSelect();
            document.getElementById('mode-mp3').classList.toggle('active', mode === 'mp3');
            document.getElementById('mode-link').classList.toggle('active', mode === 'link');
            document.getElementById('container-mp3').classList.toggle('hidden', mode !== 'mp3');
            document.getElementById('container-link').classList.toggle('hidden', mode !== 'link');
        }

        function playActionPreview(fileName) {
            new Audio(`/uploads/${fileName}`).play().catch(e => console.error(e));
        }

        const btnSave = document.getElementById('btn-save-action');
        if(btnSave) btnSave.onclick = () => {
            const username = document.getElementById('username').value;
            const gift = document.getElementById('gift-select-value').value;
            const mode = document.getElementById('mode-mp3').classList.contains('active') ? 'mp3' : 'link';
            if(mode === 'mp3') {
                const file = document.getElementById('file-input').files[0];
                if(!file) return alert("Sube un archivo");
                const reader = new FileReader();
                reader.onload = (e) => socket.emit("uploadAndSave", { username, gift, fileName: file.name, fileData: e.target.result });
                reader.readAsDataURL(file);
            } else {
                socket.emit("saveAction", { username, action: { gift, file: document.getElementById('link-input').value, type: 'link' } });
            }
        };

        socket.on("actionsUpdated", (actions) => {
            const list = document.getElementById('actions-list');
            if(list) {
                list.innerHTML = actions.map((a, i) => `
                    <div class="flex justify-between items-center bg-black/40 p-2 rounded border border-zinc-800">
                        <div class="flex items-center gap-2">
                            <img src="/regalos/${a.gift.toLowerCase().trim()}.png" class="w-6 h-6 object-contain" onerror="this.src='https://via.placeholder.com/20?text=🎁'">
                            <span class="text-[10px] text-white font-bold uppercase">${a.gift}</span>
                        </div>
                        <div class="flex gap-2">
                            ${a.type === 'mp3' ? `<button onclick="playActionPreview('${a.file}')" class="text-green-500"><i data-lucide="play-circle" class="w-4"></i></button>` : ''}
                            <button onclick="socket.emit('deleteAction', {username: document.getElementById('username').value, index: ${i}})" class="text-red-500"><i data-lucide="trash-2" class="w-4"></i></button>
                        </div>
                    </div>`).join('');
                lucide.createIcons();
            }
        });

        fetch('/gift-list').then(r => r.json()).then(d => {
            const list = document.getElementById('custom-options-list');
            if(list) list.innerHTML = d.map(g => `
                <div class="custom-select-option" onclick="selectCustomOption('${g.name}', '${g.name}')">
                    <img src="/regalos/${g.name.toLowerCase().trim()}.png" class="custom-select-option-img" onerror="this.src='https://via.placeholder.com/24?text=🎁'">
                    <span class="custom-select-option-text">${g.name}</span>
                </div>`).join('');
        });

        // --- REAL TIME EVENTS ---
        socket.on("chat", (data) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "bg-zinc-900/50 p-2 rounded text-xs flex gap-2 fade-in";
            div.innerHTML = `<span class="text-purple-400 font-bold">${data.user}:</span> <span class="text-zinc-300">${data.message}</span>`;
            container.prepend(div);
            if (container.children.length > 20) container.removeChild(container.lastElementChild);
        });

        socket.on("gift", (data) => {
            const container = document.getElementById('gift-container');
            const div = document.createElement('div');
            div.className = "gift-card p-2 rounded flex items-center gap-2 fade-in";
            div.innerHTML = `<img src="${data.image}" class="w-8 h-8 object-contain"> <div class="text-[10px]"><b>${data.user}</b> envió ${data.gift} x${data.amount}</div>`;
            container.prepend(div);
        });

        // TTS
        const synth = window.speechSynthesis;
        function speak(text) {
            if (!document.getElementById('tts-enabled').checked) return;
            const utter = new SpeechSynthesisUtterance(text);
            utter.volume = document.getElementById('tts-volume').value;
            synth.speak(utter);
        }
    </script>
</body>
</html>
