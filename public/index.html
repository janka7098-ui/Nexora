<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --red: #FF3131;
            --bg: #050507;
            --cyan: #00FFFF;
            --gold: #FFD700;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh;
            margin: 0;
        }

        .glass {
            background: rgba(15, 15, 22, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ESTILOS SELECT PERSONALIZADO (IMAGEN 1) --- */
        #custom-select-trigger {
            border: 2px solid var(--purple);
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #custom-select-trigger:hover {
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        #custom-options {
            background: #0f0f16;
            border: 2px solid var(--purple);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            animation: fadeIn 0.2s ease-out;
        }

        #gift-search {
            border: 2px solid var(--green) !important;
            border-radius: 50px;
            background: transparent;
            color: white;
        }

        /* Scrollbar estilo Imagen 1 */
        #options-list::-webkit-scrollbar { width: 6px; }
        #options-list::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        .custom-option {
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .custom-option:hover {
            background: rgba(138, 43, 226, 0.15);
        }

        /* --- OTROS ESTILOS --- */
        #loader {
            position: fixed; inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-copy-link { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 6px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .btn-copy-link:hover { color: var(--cyan); border-color: var(--cyan); }
    </style>
</head>
<body class="p-2 md:p-4 pb-12">

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 text-cyan-500 font-bold tracking-widest animate-pulse uppercase">Sincronizando...</p>
    </div>

    <nav id="nav-header" class="max-w-[1800px] mx-auto mb-6 flex flex-col lg:flex-row items-center justify-between glass p-4 gap-4">
        <div class="flex items-center gap-4">
            <img id="host-avatar" src="/Logo.png" class="h-[50px] w-[50px] rounded-full border-2 border-transparent">
            <div>
                <h1 id="host-title" class="text-2xl font-black italic uppercase">NEXORA <span class="text-cyan-500">ULTRA</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="status-pulse" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="connection-status" class="text-[10px] uppercase tracking-widest text-red-500 font-bold">Desconectado</span>
                </div>
            </div>
        </div>

        <div class="flex gap-2">
            <input id="username" type="text" placeholder="@usuario_tiktok" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs outline-none">
            <input id="key" type="password" placeholder="Key" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs outline-none">
            <button id="btn-connect" class="bg-cyan-600 hover:bg-cyan-400 text-black px-6 py-2 rounded-lg font-black text-xs uppercase transition-all">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-red-600 text-white px-6 py-2 rounded-lg font-black text-xs uppercase">Salir</button>
        </div>
    </nav>

    <main id="view-dashboard" class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 lg:h-[700px]">
        
        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-cyan-400 font-bold uppercase text-xs mb-4 italic tracking-widest">Configurar Alerta</h2>
                
                <div class="flex bg-black/40 p-1 rounded-lg border border-zinc-800 mb-4">
                    <button onclick="setMode('mp3')" id="mode-mp3" class="bg-purple-600 text-white flex-1 py-2 text-[10px] font-bold uppercase rounded-md transition-all">Modo MP3</button>
                    <button onclick="setMode('link')" id="mode-link" class="hover:bg-zinc-800 flex-1 py-2 text-[10px] font-bold uppercase rounded-md transition-all">Webhook</button>
                </div>

                <div class="space-y-4">
                    <div class="relative w-full" id="custom-select-container">
                        <div id="custom-select-trigger" class="flex justify-between items-center">
                            <span id="selected-gift-label" class="text-white font-bold text-sm">Seleccionar Regalo</span>
                            <i data-lucide="chevron-down" class="text-purple-500 w-4 h-4"></i>
                        </div>
                        
                        <div id="custom-options" class="hidden absolute z-50 w-full mt-2">
                            <div class="p-3">
                                <input type="text" id="gift-search" placeholder="Escribe para buscar..." class="w-full px-4 py-2 text-xs outline-none">
                            </div>
                            <ul id="options-list" class="max-h-60 overflow-y-auto py-1"></ul>
                        </div>
                        <input type="hidden" id="gift-select" value="">
                    </div>

                    <div id="container-mp3">
                        <input type="file" id="file-input" accept="audio/mpeg" class="hidden">
                        <button onclick="document.getElementById('file-input').click()" class="w-full bg-zinc-900 border border-dashed border-zinc-700 p-3 rounded-lg text-xs text-zinc-400 hover:border-cyan-500 flex flex-col items-center gap-2">
                            <i data-lucide="music" class="text-purple-500 w-4 h-4"></i>
                            <span id="file-name">Elegir Sonido...</span>
                        </button>
                    </div>

                    <div id="container-link" class="hidden">
                        <input id="link-input" type="text" placeholder="http://..." class="w-full bg-black/60 border border-zinc-800 p-3 rounded-lg text-xs text-cyan-400 outline-none">
                    </div>

                    <button id="btn-save-action" class="w-full bg-white text-black font-black py-3 rounded-xl text-xs uppercase hover:bg-cyan-500 transition-all">Guardar y Vincular</button>
                </div>
            </section>

            <section class="glass flex-1 p-6 flex flex-col overflow-hidden">
                <h2 class="text-purple-400 font-bold uppercase text-xs mb-4 italic tracking-widest">Alertas Activas</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>

        <div class="col-span-1 lg:col-span-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass flex flex-col overflow-hidden">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold text-purple-400 flex justify-between items-center">
                    <span>CHAT</span> <button onclick="copyOverlayUrl('chat')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold text-green-400 flex justify-between items-center">
                    <span>REGALOS</span> <button onclick="copyOverlayUrl('gifts')" class="btn-copy-link"><i data-lucide="link" class="w-3"></i></button>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-xs font-bold uppercase mb-4 text-zinc-500 italic">Controles Maestro</h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] text-zinc-500 uppercase">Bot TTS</label>
                        <input type="checkbox" id="tts-enabled" checked class="accent-cyan-500 h-4 w-4">
                    </div>
                    <select id="tts-voice" class="w-full bg-black/40 border border-zinc-800 p-2 rounded-lg text-xs text-white outline-none"></select>
                    <div>
                        <div class="flex justify-between mb-1"><label class="text-[10px] text-zinc-500 uppercase">Volumen</label><span id="vol-perc" class="text-[10px] text-cyan-400 font-bold">70%</span></div>
                        <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-cyan-500 cursor-pointer">
                    </div>
                </div>
            </section>
            
            <section class="glass flex-1 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-zinc-900 bg-black/20 text-center text-xs font-bold uppercase text-zinc-500">Historial</div>
                <div id="gift-history" class="flex-1 overflow-y-auto p-3 text-[11px] font-mono text-zinc-500"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();
        let allGifts = [];
        let currentMode = 'mp3';

        // --- SELECTOR DE REGALOS (IMAGEN 1 & 2) ---
        const trigger = document.getElementById('custom-select-trigger');
        const optionsMenu = document.getElementById('custom-options');
        const optionsList = document.getElementById('options-list');
        const searchInput = document.getElementById('gift-search');
        const hiddenInput = document.getElementById('gift-select');
        const selectedLabel = document.getElementById('selected-gift-label');

        trigger.onclick = (e) => {
            e.stopPropagation();
            optionsMenu.classList.toggle('hidden');
        };

        // Renderizar opciones basadas en los archivos de la Imagen 2
        function renderOptions(list) {
            optionsList.innerHTML = list.map(g => `
                <li class="custom-option flex items-center gap-4 p-3 cursor-pointer" onclick="selectOption('${g.name}', '${g.image}')">
                    <img src="${g.image}" class="w-8 h-8 object-contain" onerror="this.src='/regalos/default.png'">
                    <span class="text-xs font-bold uppercase tracking-wider">${g.name.replace(/_/g, ' ')}</span>
                </li>
            `).join('');
        }

        function selectOption(name, img) {
            hiddenInput.value = name;
            selectedLabel.innerHTML = `<div class="flex items-center gap-2"><img src="${img}" class="w-5 h-5 object-contain"><span>${name.toUpperCase()}</span></div>`;
            optionsMenu.classList.add('hidden');
        }

        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allGifts.filter(g => g.name.toLowerCase().includes(val));
            renderOptions(filtered);
        };

        window.onclick = () => optionsMenu.classList.add('hidden');

        // Cargar lista desde servidor
        fetch('/gift-list').then(r => r.json()).then(d => {
            allGifts = d;
            renderOptions(allGifts);
        });

        // --- LÓGICA DE ALERTAS ---
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-mp3').className = mode === 'mp3' ? "bg-purple-600 text-white flex-1 py-2 text-[10px] font-bold uppercase rounded-md" : "hover:bg-zinc-800 flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
            document.getElementById('mode-link').className = mode === 'link' ? "bg-cyan-500 text-black flex-1 py-2 text-[10px] font-bold uppercase rounded-md" : "hover:bg-zinc-800 flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
            document.getElementById('container-mp3').classList.toggle('hidden', mode !== 'mp3');
            document.getElementById('container-link').classList.toggle('hidden', mode !== 'link');
        }

        document.getElementById('btn-save-action').onclick = () => {
            const username = document.getElementById('username').value;
            const gift = hiddenInput.value;
            if(!username || !gift) return alert("Completa usuario y regalo");

            if(currentMode === 'mp3') {
                const file = document.getElementById('file-input').files[0];
                if(!file) return alert("Elige un MP3");
                document.getElementById('loader').style.display = 'flex';
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit("uploadAndSave", { username, gift, fileName: file.name, fileData: e.target.result });
                    document.getElementById('loader').style.display = 'none';
                    alert("¡Alerta MP3 guardada!");
                };
                reader.readAsDataURL(file);
            } else {
                const link = document.getElementById('link-input').value;
                if(!link) return alert("Pon el URL");
                socket.emit("saveAction", { username, action: { gift, file: link, type: 'link' } });
                alert("¡Webhook guardado!");
            }
        };

        // --- CONEXIÓN TIKTOK ---
        document.getElementById('btn-connect').onclick = () => {
            const user = document.getElementById('username').value;
            const key = document.getElementById('key').value;
            if(user && key) {
                document.getElementById('loader').style.display = 'flex';
                socket.emit("startConnection", { username: user, key: key });
            }
        };

        socket.on("status", (s) => {
            document.getElementById('loader').style.display = 'none';
            const sText = document.getElementById('connection-status');
            const sPulse = document.getElementById('status-pulse');
            if(s === "connected") {
                sText.innerText = "ONLINE"; sText.className = "text-cyan-400 font-bold";
                sPulse.className = "w-2 h-2 rounded-full bg-cyan-400 animate-ping";
                document.getElementById('btn-connect').classList.add('hidden');
                document.getElementById('btn-disconnect').classList.remove('hidden');
            } else {
                sText.innerText = "OFFLINE"; sText.className = "text-red-500 font-bold";
                sPulse.className = "w-2 h-2 rounded-full bg-red-500";
            }
        });

        socket.on("actionsUpdated", (actions) => {
            const list = document.getElementById('actions-list');
            list.innerHTML = actions.map((a, i) => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-lg border border-zinc-800">
                    <div class="text-[10px] font-bold"><span class="text-purple-400">${a.type.toUpperCase()}</span><br>${a.gift}</div>
                    <button onclick="socket.emit('deleteAction', {username: document.getElementById('username').value, index: ${i}})" class="text-red-500 hover:text-white"><i data-lucide="trash-2" class="w-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        });

        // Volumen UI
        document.getElementById('tts-volume').oninput = (e) => document.getElementById('vol-perc').innerText = Math.round(e.target.value * 100) + "%";
    </script>
</body>
</html>
