<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --red: #FF3131;
            --bg: #050507;
            --cyan: #00FFFF;
            --gold: #FFD700;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh;
            margin: 0;
        }

        .glass {
            background: rgba(15, 15, 22, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #loader {
            position: fixed; inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCROLLBAR GENERAL */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        /* =========================================
           DISEÑO DEL SELECTOR DE REGALOS (ESTILO IMAGEN)
           ========================================= */
        
        .custom-select-wrapper {
            position: relative;
            user-select: none;
            width: 100%;
        }

        /* Botón disparador ovalado */
        .custom-select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.8rem 1.2rem;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--purple);
            border-radius: 50px; /* Forma de píldora */
            color: #efefef;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .custom-select-trigger:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        /* Panel desplegable con scroll */
        .custom-select-options {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background-color: #0a0a0c;
            border: 2px solid var(--purple);
            border-radius: 1.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.25s ease-out;
            max-height: 420px; /* Altura ideal para scrollear */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .custom-select-wrapper.open .custom-select-options {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Buscador interno verde neón */
        .custom-select-search-container {
            padding: 1rem;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }

        .custom-select-search {
            width: 100%;
            padding: 0.6rem 1.2rem;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1.5px solid var(--green);
            border-radius: 50px;
            color: #efefef;
            font-size: 0.8rem;
            outline: none;
            transition: 0.3s;
        }

        /* Lista de regalos con scroll morado */
        .custom-select-options-list {
            overflow-y: auto;
            flex: 1;
            padding: 0.5rem 0;
        }

        .custom-select-options-list::-webkit-scrollbar { width: 6px; }
        .custom-select-options-list::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        /* Cada opción de regalo */
        .custom-select-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            color: #ccc;
        }

        .custom-select-option:hover {
            background-color: rgba(138, 43, 226, 0.15);
            color: white;
        }

        .custom-select-option img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .custom-select-option.hidden { display: none; }

        /* Otros botones */
        .mode-btn { background: rgba(255,255,255,0.05); color: #666; transition: all 0.3s; cursor: pointer; }
        .mode-btn.active { background: var(--purple); color: white; }
        .mode-btn.active.webhook-active { background: var(--cyan); color: black; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-copy-link {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 6px;
            border-radius: 6px; color: #a1a1aa; cursor: pointer; transition: all 0.2s;
        }
        .btn-copy-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 255, 255, 0.1); }

        .gift-card {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.05) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(57, 255, 20, 0.1);
            position: relative;
            overflow: hidden;
        }
        .gift-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    </style>
</head>
<body class="p-2 md:p-4 pb-12">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const overlayType = urlParams.get('overlay'); 
        const isOverlay = !!overlayType;

        if(isOverlay) {
            document.documentElement.style.background = 'transparent';
            document.body.style.background = 'transparent';
            document.body.style.backgroundImage = 'none';
            document.body.className = 'm-0 p-0 w-screen h-screen overflow-hidden bg-transparent';
            
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('nav-header').style.display = 'none';
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('view-dashboard').style.display = 'none';
                if (['chat', 'gifts', 'likes', 'donators'].includes(overlayType)) {
                    const widgetContainer = document.createElement('div');
                    widgetContainer.className = 'w-full h-full p-2 flex flex-col justify-start overflow-hidden bg-transparent';
                    document.body.appendChild(widgetContainer);
                    let targetId = (overlayType === 'chat') ? 'chat-container' : (overlayType === 'gifts') ? 'gift-container' : (overlayType === 'likes') ? 'ranking-container' : 'dashboard-donators-container';
                    const targetEl = document.getElementById(targetId);
                    if(targetEl) {
                        targetEl.className = 'w-full h-full overflow-hidden flex flex-col bg-transparent';
                        widgetContainer.appendChild(targetEl);
                    }
                }
            });
        }
    </script>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 text-cyan-500 font-bold tracking-widest animate-pulse uppercase">Procesando Datos...</p>
    </div>

    <nav id="nav-header" class="max-w-[1800px] mx-auto mb-6 flex flex-col lg:flex-row items-center justify-between glass p-4 gap-4">
        <div class="flex items-center gap-4">
            <img id="host-avatar" src="/Logo.png" alt="Logo" class="h-[55px] w-[55px] object-cover rounded-full border-2 border-transparent transition-all duration-500">
            <div class="flex flex-col">
                <h1 id="host-title" class="text-2xl font-black italic tracking-tighter leading-none uppercase">NEXORA <span class="text-cyan-500">ULTRA</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="status-pulse" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="connection-status" class="text-[10px] uppercase tracking-[3px] text-red-500 font-bold italic">Desconectado</span>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap justify-center gap-3 items-center">
            <input id="username" type="text" placeholder="@usuario_tiktok" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs focus:border-cyan-500 outline-none w-40 font-medium">
            <input id="key" type="password" placeholder="Access Key" class="bg-black/60 border border-zinc-800 px-3 py-2 rounded-lg text-xs focus:border-cyan-500 outline-none w-32 font-medium">
            <button id="btn-connect" onmouseover="playHover()" class="bg-cyan-600 hover:bg-cyan-400 text-black px-6 py-2 rounded-lg font-black text-xs transition-all uppercase tracking-widest">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-zinc-900 border border-red-600 text-red-500 px-6 py-2 rounded-lg font-black text-xs transition-all uppercase tracking-widest">Salir</button>
        </div>
    </nav>

    <div id="action-buttons" class="max-w-[1800px] mx-auto mb-6 flex flex-col sm:flex-row gap-4 justify-center">
        <a href="juego.html" onmouseover="playHover()" class="flex-1 max-w-[300px] bg-purple-600 hover:bg-purple-500 text-white text-center py-3 rounded-xl font-black uppercase tracking-widest transition-all border-2 border-purple-400">Ir a Juego</a>
        <a href="interactivo.html" onmouseover="playHover()" class="flex-1 max-w-[300px] bg-cyan-600 hover:bg-cyan-400 text-black text-center py-3 rounded-xl font-black uppercase tracking-widest transition-all border-2 border-cyan-400">Ir a Interactivo</a>
    </div>

    <main id="view-dashboard" class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 lg:h-[750px]">
        
        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-cyan-400 font-bold uppercase text-xs mb-4 flex items-center gap-2 italic tracking-widest"><i data-lucide="upload-cloud" class="w-4"></i> Configurar Alerta</h2>
                
                <div class="flex bg-black/40 p-1 rounded-lg border border-zinc-800 mb-4">
                    <button onclick="setMode('mp3')" onmouseover="playHover()" id="mode-mp3" class="mode-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Modo MP3</button>
                    <button onclick="setMode('link')" onmouseover="playHover()" id="mode-link" class="mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Webhook Juego</button>
                </div>

                <div class="space-y-4">
                    <div class="custom-select-wrapper" id="gift-select-wrapper">
                        <div class="custom-select-trigger" onmouseover="playHover()" onclick="toggleCustomSelect()">
                            <span id="custom-select-label">Seleccionar Regalo</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-purple-500 transition-transform duration-300" id="custom-select-arrow"></i>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-search-container">
                                <input type="text" class="custom-select-search" placeholder="Buscar regalo..." onkeyup="filterCustomOptions(this.value)">
                            </div>
                            <div class="custom-select-options-list" id="custom-options-list">
                                </div>
                        </div>
                        <input type="hidden" id="gift-select-value" value="">
                    </div>

                    <div id="gift-preview-container" class="hidden flex flex-col items-center justify-center p-4 bg-black/40 border border-zinc-800 rounded-xl">
                        <img id="gift-preview-img" src="" class="w-20 h-20 object-contain animate-bounce">
                    </div>

                    <div id="container-mp3">
                        <input type="file" id="file-input" accept="audio/mpeg" class="hidden">
                        <button onclick="document.getElementById('file-input').click()" onmouseover="playHover()" class="w-full bg-zinc-900 border border-dashed border-zinc-700 p-3 rounded-lg text-xs text-zinc-400 hover:border-cyan-500 transition-all flex flex-col items-center gap-2"><i data-lucide="music" class="w-4 h-4 text-purple-500"></i><span id="file-name">Seleccionar MP3...</span></button>
                    </div>

                    <div id="container-link" class="hidden">
                        <input id="link-input" type="text" placeholder="URL Webhook" class="w-full bg-black/60 border border-zinc-800 p-3 rounded-lg text-xs text-cyan-400 outline-none">
                    </div>

                    <button id="btn-save-action" onmouseover="playHover()" class="w-full bg-white text-black font-black py-3 rounded-xl text-xs uppercase hover:bg-cyan-500 transition-all">Guardar Evento</button>
                </div>
            </section>

            <section class="glass flex-1 p-6 flex flex-col overflow-hidden min-h-[250px]">
                <h2 class="text-purple-400 font-bold uppercase text-xs mb-4 italic tracking-widest">Eventos Activos</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>

        <div class="col-span-1 lg:col-span-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass flex flex-col overflow-hidden h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold tracking-widest italic text-purple-400 flex justify-between items-center">
                    <span>CHAT</span> <button onclick="copyOverlayUrl('chat')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold tracking-widest italic text-green-400 flex justify-between items-center">
                    <span>REGALOS</span> <button onclick="copyOverlayUrl('gifts')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold tracking-widest italic text-red-500 flex justify-between items-center">
                    <span>TOP LIKES</span> <button onclick="copyOverlayUrl('likes')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="ranking-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            </div>
            <div class="glass flex flex-col overflow-hidden h-full">
                <div class="p-3 border-b border-zinc-900 bg-black/20 text-xs font-bold tracking-widest italic text-yellow-500 flex justify-between items-center">
                    <span>TOP DONADORES</span> <button onclick="copyOverlayUrl('donators')" class="btn-copy-link"><i data-lucide="link" class="w-3 h-3"></i></button>
                </div>
                <div id="dashboard-donators-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-3 flex flex-col gap-6">
            <section class="glass p-6">
                <h2 class="text-xs font-bold uppercase mb-4 text-zinc-500 italic">Controles Maestro</h2>
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-2 justify-between mb-2"><label class="text-[10px] text-zinc-500 uppercase">Voz Bot (TTS)</label><input type="checkbox" id="tts-enabled" checked class="accent-cyan-500 h-4 w-4"></div>
                        <select id="tts-voice" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-xs text-white outline-none"></select>
                    </div>
                    <div>
                        <div class="flex justify-between mb-1"><label class="text-[10px] text-zinc-500 uppercase">Volumen</label><span id="vol-perc" class="text-[10px] text-cyan-400 font-bold">70%</span></div>
                        <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-cyan-500 cursor-pointer">
                    </div>
                    <div class="pt-4 border-t border-zinc-800 space-y-3">
                        <label class="text-[10px] text-zinc-500 uppercase block font-bold">Filtro TTS</label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/30 p-2 rounded-lg"><input type="radio" name="tts-filter" value="all" checked class="accent-cyan-500"><span class="text-[11px] uppercase">Todos</span></label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/30 p-2 rounded-lg"><input type="radio" name="tts-filter" value="followers" class="accent-green-500"><span class="text-[11px] uppercase">Seguidores</span></label>
                        <label class="flex items-center gap-2 cursor-pointer bg-black/30 p-2 rounded-lg"><input type="radio" name="tts-filter" value="vip" class="accent-purple-500"><span class="text-[11px] uppercase">Mods/Subs</span></label>
                    </div>
                </div>
            </section>
            
            <section class="glass flex-1 overflow-hidden min-h-[200px]">
                <div class="p-4 border-b border-zinc-900 bg-black/20 text-center"><h2 class="text-xs font-bold uppercase tracking-widest italic text-zinc-500">Historial</h2></div>
                <div id="gift-history" class="p-3 space-y-2 text-[11px] font-mono text-zinc-500 overflow-y-auto h-full"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();
        
        const sndHover = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const sndSelect = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        sndHover.volume = 0.15; sndSelect.volume = 0.35;

        function playHover() { if(!isOverlay) sndHover.cloneNode().play().catch(()=>{}); }
        function playSelect() { if(!isOverlay) sndSelect.cloneNode().play().catch(()=>{}); }

        /* LÓGICA SELECTOR PERSONALIZADO */
        function toggleCustomSelect() {
            const wrapper = document.getElementById('gift-select-wrapper');
            const arrow = document.getElementById('custom-select-arrow');
            wrapper.classList.toggle('open');
            arrow.style.transform = wrapper.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            if(wrapper.classList.contains('open')) setTimeout(() => wrapper.querySelector('.custom-select-search').focus(), 50);
        }

        function filterCustomOptions(val) {
            const list = document.getElementById('custom-options-list');
            const term = val.toLowerCase();
            list.querySelectorAll('.custom-select-option').forEach(opt => {
                opt.classList.toggle('hidden', !opt.innerText.toLowerCase().includes(term));
            });
        }

        function selectCustomOption(id, name, img) {
            playSelect();
            document.getElementById('gift-select-value').value = id;
            document.getElementById('custom-select-label').innerText = name.toUpperCase();
            document.getElementById('gift-preview-container').classList.remove('hidden');
            document.getElementById('gift-preview-img').src = img;
            toggleCustomSelect();
        }

        window.onclick = (e) => {
            const w = document.getElementById('gift-select-wrapper');
            if(w && !w.contains(e.target) && w.classList.contains('open')) toggleCustomSelect();
        };

        /* CARGA DE DATOS */
        fetch('/gift-list').then(r => r.json()).then(data => {
            const list = document.getElementById('custom-options-list');
            data.sort((a,b) => a.name.localeCompare(b.name));
            list.innerHTML = data.map(g => {
                const url = `/regalos/${g.name.toLowerCase()}.png`;
                return `<div class="custom-select-option" onmouseover="playHover()" onclick="selectCustomOption('${g.name}', '${g.name}', '${url}')">
                    <img src="${url}" onerror="this.src='https://via.placeholder.com/32?text=🎁'">
                    <span class="text-sm font-bold">${g.name}</span>
                </div>`;
            }).join('');
        });

        const synth = window.speechSynthesis; let voices = [];
        function loadVoices() { voices = synth.getVoices(); document.getElementById('tts-voice').innerHTML = voices.map((v, i) => `<option value="${i}" ${v.lang.includes('es') ? 'selected' : ''}>${v.name}</option>`).join(''); }
        speechSynthesis.onvoiceschanged = loadVoices; loadVoices();

        function speak(text) {
            if (!document.getElementById('tts-enabled').checked || isOverlay) return;
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voices[document.getElementById('tts-voice').value] || voices[0];
            utter.volume = document.getElementById('tts-volume').value;
            synth.speak(utter);
        }

        /* SOCKETS Y UI */
        document.getElementById('btn-connect').onclick = () => {
            const u = document.getElementById('username').value; const k = document.getElementById('key').value;
            if(u && k) { document.getElementById('loader').style.display = 'flex'; socket.emit("startConnection", { username: u, key: k }); }
        };

        document.getElementById('btn-disconnect').onclick = () => socket.emit("stopConnection");

        socket.on("status", (s) => {
            document.getElementById('loader').style.display = 'none';
            const connected = s === "connected";
            document.getElementById('connection-status').innerText = connected ? "SISTEMA ONLINE" : "OFFLINE";
            document.getElementById('connection-status').className = connected ? "text-[10px] tracking-[3px] text-cyan-400 font-bold italic" : "text-[10px] tracking-[3px] text-red-500 font-bold italic";
            document.getElementById('btn-connect').classList.toggle('hidden', connected);
            document.getElementById('btn-disconnect').classList.toggle('hidden', !connected);
            if(connected) speak("Sistemas Nexora en línea.");
        });

        socket.on("chat", (d) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "bg-zinc-900/50 p-2 rounded-lg border-l-2 border-purple-500 text-xs flex items-center gap-2 fade-in";
            div.innerHTML = `<img src="/avatar-proxy?url=${encodeURIComponent(d.avatar)}" class="w-6 h-6 rounded-full">
                             <div><span class="text-purple-400 font-bold">${d.user}:</span> <span class="text-zinc-300">${d.message}</span></div>`;
            container.prepend(div);
            if (container.children.length > 15) container.removeChild(container.lastElementChild);
            speak(`${d.user} dice ${d.message}`);
        });

        socket.on("gift", (d) => {
            const container = document.getElementById('gift-container');
            const div = document.createElement('div');
            div.className = "gift-card p-3 rounded-xl flex items-center gap-3 fade-in shadow-lg";
            div.innerHTML = `<img src="/avatar-proxy?url=${encodeURIComponent(d.avatar)}" class="w-10 h-10 rounded-full border-2 border-green-500">
                             <div class="flex-1"><b class="text-white text-xs">${d.user}</b><p class="text-[9px] text-zinc-400 uppercase">Envió ${d.gift} x${d.amount}</p></div>
                             <img src="${d.image}" class="w-10 h-10 object-contain">`;
            container.prepend(div);
            if (container.children.length > 15) container.removeChild(container.lastElementChild);
        });

        document.getElementById('btn-save-action').onclick = () => {
            const u = document.getElementById('username').value;
            const g = document.getElementById('gift-select-value').value;
            if(!u || !g) return alert("Faltan datos");
            if(currentMode === 'mp3') {
                const f = document.getElementById('file-input').files[0];
                if(!f) return alert("Sube un MP3");
                const r = new FileReader();
                r.onload = (e) => socket.emit("uploadAndSave", { username: u, gift: g, fileName: f.name, fileData: e.target.result });
                r.readAsDataURL(f);
            } else {
                socket.emit("saveAction", { username: u, action: { gift: g, file: document.getElementById('link-input').value, type: 'link' } });
            }
        };

        let currentMode = 'mp3';
        function setMode(m) {
            currentMode = m;
            document.getElementById('mode-mp3').classList.toggle('active', m === 'mp3');
            document.getElementById('mode-link').classList.toggle('active', m === 'link');
            document.getElementById('container-mp3').classList.toggle('hidden', m !== 'mp3');
            document.getElementById('container-link').classList.toggle('hidden', m !== 'link');
        }

        function copyOverlayUrl(t) {
            const url = window.location.origin + '/?overlay=' + t;
            navigator.clipboard.writeText(url).then(() => alert('URL Copiada para OBS'));
        }
    </script>
</body>
</html>
