<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --red: #FF3131;
            --bg: #050507;
            --cyan: #00FFFF;
            --gold: #FFD700;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh;
            margin: 0;
        }

        .glass {
            background: rgba(15, 15, 22, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #loader {
            position: fixed; inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Estilos del Dropdown Personalizado */
        #custom-options::-webkit-scrollbar { width: 6px; }
        #custom-options::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        .mode-btn { background: rgba(255,255,255,0.05); color: #666; transition: all 0.3s; }
        .mode-btn.active { background: var(--purple); color: white; }
        .mode-btn.active.webhook-active { background: var(--cyan); color: black; }

        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-copy-link {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 6px;
            border-radius: 6px; color: #a1a1aa; cursor: pointer; transition: all 0.2s;
        }
        .btn-copy-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 255, 255, 0.1); }
    </style>
</head>
<body class="p-2 md:p-4 pb-12">

   <script>
    const socket = io();
    lucide.createIcons();
    
    const donatorsMap = new Map();
    const giftersSet = new Set();
    let allGifts = [];

    // ✅ FIX: variable faltante
    let currentMode = 'mp3';

    // --- LÓGICA DROPDOWN PERSONALIZADO ---
    const trigger = document.getElementById('custom-select-trigger');
    const optionsMenu = document.getElementById('custom-options');
    const optionsList = document.getElementById('options-list');
    const searchInput = document.getElementById('gift-search');
    const hiddenInput = document.getElementById('gift-select');
    const selectedText = document.getElementById('selected-gift-text');

    trigger.onclick = () => optionsMenu.classList.toggle('hidden');

    function renderGifts(gifts) {
        optionsList.innerHTML = gifts.map(g => `
            <li class="flex items-center gap-3 p-3 hover:bg-purple-900/40 cursor-pointer transition-colors border-b border-zinc-900/50 last:border-0" 
                onclick="selectGift('${g.name}', '${g.image}')">
                <img src="${g.image}" class="w-8 h-8 object-contain" onerror="this.src='https://via.placeholder.com/32?text=🎁'">
                <span class="text-xs font-bold text-zinc-200 uppercase tracking-tight">${g.name}</span>
            </li>
        `).join('');
    }

    function selectGift(name, img) {
        hiddenInput.value = name;
        selectedText.innerHTML = `
            <div class="flex items-center gap-2">
                <img src="${img}" class="w-5 h-5 object-contain">
                <span>${name.toUpperCase()}</span>
            </div>`;
        optionsMenu.classList.add('hidden');
    }

    searchInput.oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allGifts.filter(g => g.name.toLowerCase().includes(term));
        renderGifts(filtered);
    };

    document.addEventListener('click', (e) => {
        if (!document.getElementById('custom-select-container').contains(e.target)) {
            optionsMenu.classList.add('hidden');
        }
    });

    fetch('/gift-list')
        .then(r => r.json())
        .then(d => {
            allGifts = d || [];
            renderGifts(allGifts);
        })
        .catch(() => {
            console.error("Error cargando regalos");
        });

    // --- FIN LÓGICA DROPDOWN ---

    function copyOverlayUrl(type) {
        const url = window.location.origin + '/?overlay=' + type;
        navigator.clipboard.writeText(url).then(() => {
            alert('¡Enlace copiado!\n' + url);
        });
    }

    const synth = window.speechSynthesis;
    let voices = [];

    function loadVoices() {
        voices = synth.getVoices();
        const voiceSelect = document.getElementById('tts-voice');
        if (voiceSelect) {
            voiceSelect.innerHTML = voices.map((v, i) =>
                `<option value="${i}" ${v.lang.includes('es') ? 'selected' : ''}>${v.name}</option>`
            ).join('');
        }
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        const ttsCheckbox = document.getElementById('tts-enabled');
        if (!ttsCheckbox || !ttsCheckbox.checked || isOverlay) return;

        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = voices[document.getElementById('tts-voice').value] || voices[0];
        utter.volume = document.getElementById('tts-volume').value;
        synth.speak(utter);
    }

    const volInput = document.getElementById('tts-volume');
    if (volInput) {
        volInput.oninput = (e) => {
            document.getElementById('vol-perc').innerText =
                Math.round(e.target.value * 100) + "%";
        };
    }

    function setMode(mode) {
        currentMode = mode;

        document.getElementById('mode-mp3').className =
            mode === 'mp3'
                ? "mode-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-md"
                : "mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md";

        document.getElementById('mode-link').className =
            mode === 'link'
                ? "mode-btn active webhook-active flex-1 py-2 text-[10px] font-bold uppercase rounded-md"
                : "mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md";

        document.getElementById('container-mp3').classList.toggle('hidden', mode !== 'mp3');
        document.getElementById('container-link').classList.toggle('hidden', mode !== 'link');
    }

    const btnSave = document.getElementById('btn-save-action');
    if (btnSave) {
        btnSave.onclick = () => {
            const username = document.getElementById('username').value;
            const gift = hiddenInput.value;

            if (!username || !gift) return alert("Faltan datos");

            if (currentMode === 'mp3') {
                const fileInput = document.getElementById('file-input');
                const file = fileInput.files[0];

                if (!file) return alert("Selecciona un MP3");

                document.getElementById('loader').style.display = 'flex';

                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit("uploadAndSave", {
                        username,
                        gift,
                        fileName: file.name,
                        fileData: e.target.result
                    });

                    fileInput.value = "";
                    document.getElementById('file-name').innerText = "Seleccionar MP3...";
                };

                reader.readAsDataURL(file);

            } else {
                const link = document.getElementById('link-input').value;
                if (!link) return alert("Ingresa el Link");

                socket.emit("saveAction", {
                    username,
                    action: { gift, file: link, type: 'link' }
                });

                document.getElementById('link-input').value = "";
            }
        };
    }

    const fileInput = document.getElementById('file-input');
    if (fileInput) {
        fileInput.onchange = (e) => {
            document.getElementById('file-name').innerText =
                e.target.files[0]?.name || "Seleccionar MP3...";
        };
    }

    function deleteAction(index) {
        socket.emit("deleteAction", {
            username: document.getElementById('username').value,
            index
        });
    }

    const btnConnect = document.getElementById('btn-connect');
    if (btnConnect) {
        btnConnect.onclick = () => {
            const username = document.getElementById('username').value;
            const key = document.getElementById('key').value;

            if (!username || !key) return alert("Faltan datos");

            document.getElementById('loader').style.display = 'flex';
            socket.emit("startConnection", { username, key });
        };
    }

    const btnDisconnect = document.getElementById('btn-disconnect');
    if (btnDisconnect) {
        btnDisconnect.onclick = () => {
            socket.emit("stopConnection");
        };
    }

    socket.on("status", (status) => {
        if (isOverlay) return;

        document.getElementById('loader').style.display = 'none';

        const sText = document.getElementById('connection-status');
        const sPulse = document.getElementById('status-pulse');

        if (status === "connected") {
            sText.innerText = "SISTEMA ONLINE";
            sPulse.className = "w-2 h-2 rounded-full bg-cyan-400 animate-ping";

            document.getElementById('btn-connect').classList.add('hidden');
            document.getElementById('btn-disconnect').classList.remove('hidden');

            speak("Sistemas en línea.");
            socket.emit("getActions", document.getElementById('username').value);

        } else {
            sText.innerText = "OFFLINE";
            sPulse.className = "w-2 h-2 rounded-full bg-red-500";

            document.getElementById('btn-connect').classList.remove('hidden');
            document.getElementById('btn-disconnect').classList.add('hidden');
        }
    });
</script>
</body>
</html>
