<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Nexora</title>
</head>
<body style="background:#020617; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

    <div style="background:#0f172a; padding:30px; border-radius:10px; text-align:center; width:300px;">
        <h2>🔐 Login Nexora</h2>

        <input id="user" placeholder="Usuario" style="margin:10px; padding:10px; width:90%;"><br>
        <input id="pass" type="password" placeholder="Contraseña" style="margin:10px; padding:10px; width:90%;"><br>

        <button onclick="login()" style="padding:10px 20px; cursor:pointer;">Entrar</button>

        <p id="msg"></p>
    </div>

    <script>
        function login(){
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;

            // 🔐 LOGIN SIMPLE (puedes cambiarlo luego)
            if(user === "admin" && pass === "1234"){
                localStorage.setItem("auth", "true");
                window.location.href = "/index";
            } else {
                document.getElementById("msg").innerText = "❌ Usuario o contraseña incorrectos";
            }
        }
    </script>

</body>
</html>
